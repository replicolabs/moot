<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moot</title>
  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 48px auto;
      padding: 0 20px;
      color: #1a1a2e;
      background: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e8e8f0; background: #14141f; }
      .card { background: #1e1e2e !important; border-color: #33334a !important; }
      .muted { color: #9090a8 !important; }
    }
    h1 { font-size: 20px; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e8;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
    }
    .muted { color: #666; font-size: 13px; }
    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .row span:first-child { color: #666; }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .primary { background: #5b4bff; color: white; }
    .primary:disabled { background: #ccc; cursor: not-allowed; }
    #status { font-size: 13px; margin-top: 12px; white-space: pre-wrap; }
    code { font-size: 12px; background: rgba(128,128,128,0.15); padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Moot</h1>
  <div id="app" class="card">Loading...</div>
  <div id="status"></div>
  <script src="app.js"></script>
</body>
</html>
