  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="spotlight" aria-hidden="true"></div>
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <header>
    <a class="brand" href="#" aria-label="Moot home">
      <img src="assets/moot.png" alt="" />
      <span>Moot</span>
    </a>

    <a href="https://github.com/replicolabs/moot" target="_blank" rel="noopener" class="github-link" id="repo-link" aria-label="View Moot on GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"></path></svg>
      <span>GitHub</span>
    </a>
  </header>

  <main>
    <div class="copy">
      <h1>Pay people, straight from Slack.</h1>

      <p class="lede">
        Just tell Moot who to pay in plain English. Before anything goes out, your team has to
        approve it themselves. No single person, and not even Moot, can send money alone.
      </p>

      <div class="ctas">
        <a class="btn btn-star" href="https://github.com/replicolabs/moot" target="_blank" rel="noopener" id="star-link" aria-label="Star Moot on GitHub">
          <img src="assets/star-icon.png" alt="" class="btn-icon" />
          Star on GitHub
          <span class="star-count" id="star-count"></span>
        </a>
        <a class="btn btn-slack" href="#" id="slack-link" aria-label="Try Moot on Slack">
          <img src="assets/slack-icon.png" alt="" class="btn-icon" />
          Try on Slack
        </a>
      </div>
    </div>

    <div class="visual">
      <div class="shot-frame" id="shot-frame">
        <img src="assets/slack-moot.png" alt="Moot listing its capabilities in a Slack thread" />
      </div>
    </div>
  </main>
